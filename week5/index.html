<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Local Community Event Portal</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f0f0f0;
            /* Internal style for background */
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Inline CSS -->
    <h1 style="color: red;">Local Community Event Portal</h1>

    <h2 id="mainHeader">Upcoming Events</h2>

    <div class="eventCard">
        <h3>Music Festival</h3>
        <p class="description">Enjoy live performances from local artists.</p>
        <a href="#" class="cta-button">Register Now</a>
    </div>

    <section class="news">
        <p>Community bulletin content displayed in two columns...</p>
        <p>More updates and announcements here...</p>
    </section>

    <table>
        <tr>
            <th>Event</th>
            <th>Date</th>
        </tr>
        <tr>
            <td>Music Festival</td>
            <td>Aug 15</td>
        </tr>
        <tr>
            <td>Food Fair</td>
            <td>Aug 20</td>
        </tr>
    </table>
</body>

</html>
